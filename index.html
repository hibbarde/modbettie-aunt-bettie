<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aunt Bettie's Closet</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#0d0d0d;}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const MODULES = [
      { id: 1, name: "Arrival", symbol: "✦" },
      { id: 2, name: "Self", symbol: "◎" },
      { id: 3, name: "Support", symbol: "◇" },
      { id: 4, name: "Style", symbol: "◉" },
      { id: 5, name: "Closet", symbol: "◈" },
      { id: 6, name: "Ritual", symbol: "✧" },
    ];

    const isReturning = window.location.search.includes('returning=true');

    const WELCOME_RETURNING = "[MODULE:1]\n\n**Welcome back.**\n\nYou've already done the work. Now let's go deeper.\n\n**Did you spend some time with me before you booked?**\n[CHOICES: Yes, I have my Style Card | Starting fresh]";

    const WELCOME = "[MODULE:1]\n\n**Meet Your Aunt Bettie.**\n\nShe's not here to ask what colors you \"usually gravitate toward\" and then pat herself on the back like she solved your soul in a cardigan.\n\nShe's here to help you get honest about who's showing up for this session.\n\nWe'll get to the wardrobe. First, we figure out who we're dressing.\n\n**Before we talk about a single piece of clothing — when you imagine seeing your final images for the first time, what do you want to feel?**\n[CHOICES: Seen. Actually seen. | Terrifyingly beautiful | Soft and undeniable | Powerful in a quiet way | Free from the version everyone else knows]";

    const MoonIcon = () => (
      React.createElement("svg", {width:"24",height:"24",viewBox:"0 0 28 28",fill:"none"},
        React.createElement("circle",{cx:"14",cy:"14",r:"11",stroke:"#c1622f",strokeWidth:"1.5",fill:"none"}),
        React.createElement("circle",{cx:"14",cy:"14",r:"7",fill:"#c1622f",opacity:"0.15"}),
        React.createElement("path",{d:"M14 3 C8 3 3 8 3 14 C3 20 8 25 14 25 C11 22 9 18 9 14 C9 10 11 6 14 3Z",fill:"#c1622f",opacity:"0.3"})
      )
    );

    const parseModule = t => { const m = t.match(/^\[MODULE:(\w+)\]/); return m ? m[1] : null; };
    const stripTag = t => t.replace(/^\[MODULE:\w+\]\n?/, "");
    const parseChoices = text => {
      const mm = text.match(/\[CHOICES:MULTI:\s*([^\]]+)\]/);
      const sm = text.match(/\[CHOICES:\s*([^\]]+)\]/);
      const match = mm || sm;
      if (!match) return { clean: text, choices: [], multi: false };
      const choices = match[1].split("|").map(c => c.trim()).filter(Boolean);
      const multi = !!mm || choices.length > 6;
      const clean = text.replace(/\[CHOICES:(?:MULTI:)?\s*[^\]]+\]/, "").trimEnd();
      return { clean, choices, multi };
    };

    function App() {
      const [messages, setMessages] = useState([{ role: "assistant", content: isReturning ? WELCOME_RETURNING : WELCOME }]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [entered, setEntered] = useState(false);
      const [currentModule, setCurrentModule] = useState(1);
      const [showResults, setShowResults] = useState(false);
      const [showPhotog, setShowPhotog] = useState(false);
      const [summaryText, setSummaryText] = useState("");
      const [usedChoices, setUsedChoices] = useState(new Set());
      const [multiSelections, setMultiSelections] = useState({});
      const bottomRef = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

      const toggleMulti = (idx, choice) => {
        setMultiSelections(prev => {
          const cur = new Set(prev[idx] || []);
          cur.has(choice) ? cur.delete(choice) : cur.add(choice);
          return { ...prev, [idx]: cur };
        });
      };

      const submitMulti = idx => {
        const sel = multiSelections[idx];
        if (!sel || sel.size === 0) return;
        setUsedChoices(prev => new Set([...prev, `${idx}-done`]));
        sendMessage(Array.from(sel).join(", "));
      };

      const sendMessage = async text => {
        if (!text.trim() || loading) return;
        const updated = [...messages, { role: "user", content: text }];
        setMessages(updated);
        setInput("");
        setLoading(true);
        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1500,
              messages: updated.map(m => ({ role: m.role, content: stripTag(m.content).replace(/\[CHOICES:(?:MULTI:)?[^\]]+\]/g, "") }))
            })
          });
          const data = await res.json();
          const reply = data.content?.[0]?.text || "Something interrupted us — please try again.";
          const mod = parseModule(reply);
          if (mod === "SUMMARY") { setSummaryText(reply); setCurrentModule(7); }
          else if (mod) setCurrentModule(parseInt(mod));
          setMessages(prev => [...prev, { role: "assistant", content: reply }]);
        } catch(e) {
          setMessages(prev => [...prev, { role: "assistant", content: "Something interrupted us — please try again." }]);
        }
        setLoading(false);
      };

      const handleChoice = (choice, i) => {
        const key = `${i}-${choice}`;
        if (usedChoices.has(key)) return;
        setUsedChoices(prev => new Set([...prev, key]));
        sendMessage(choice);
      };

      const handleKey = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(input); } };

      const renderText = text => {
        const clean = stripTag(text).replace(/\[CHOICES:(?:MULTI:)?[^\]]+\]/g, "").trimEnd();
        return clean.split("\n").map((line, i) => {
          if (!line) return React.createElement("div", {key:i, style:{height:"0.4em"}});
          if (line.includes("---PHOTOGRAPHER SUMMARY---") || line.trim() === "---" || line.match(/^\[MODULE:\w+\]$/)) return null;
          const parts = line.split(/(\*\*[^*]+\*\*|\*[^*]+\*)/g).map((p, j) => {
            if (p.startsWith("**") && p.endsWith("**")) return React.createElement("strong", {key:j}, p.slice(2,-2));
            if (p.startsWith("*") && p.endsWith("*")) return React.createElement("em", {key:j}, p.slice(1,-1));
            return p;
          });
          return React.createElement("p", {key:i, style:{margin:"0.2em 0",lineHeight:"1.75"}}, ...parts);
        });
      };

      const isSummary = currentModule === 7;

      const ProgressBar = () => React.createElement("div", {style:{width:"100%",padding:"12px 20px 0"}},
        React.createElement("div", {style:{display:"flex",alignItems:"center"}},
          ...MODULES.map((mod, i) =>
            React.createElement("div", {key:mod.id, style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",position:"relative"}},
              i < MODULES.length && React.createElement("div", {style:{position:"absolute",top:"8px",left:"50%",width:"100%",height:"1px",background:currentModule>mod.id?"rgba(193,98,47,0.5)":"rgba(255,255,255,0.2)",transition:"background 0.5s"}}),
              React.createElement("div", {style:{width:"16px",height:"16px",borderRadius:"50%",background:currentModule>mod.id?"#c1622f":currentModule===mod.id?"rgba(193,98,47,0.3)":"rgba(255,255,255,0.06)",border:currentModule===mod.id?"1px solid #c1622f":currentModule>mod.id?"none":"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"7px",color:currentModule>mod.id?"#000":currentModule===mod.id?"#c1622f":"rgba(255,255,255,0.2)",zIndex:1,transition:"all 0.4s",flexShrink:0}}, currentModule>mod.id?"✓":mod.symbol),
              React.createElement("div", {style:{fontSize:"7px",color:currentModule===mod.id?"#c1622f":currentModule>mod.id?"rgba(193,98,47,0.7)":"rgba(255,255,255,0.4)",marginTop:"4px",textTransform:"uppercase",whiteSpace:"nowrap"}}, mod.name)
            )
          ),
          React.createElement("div", {style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}},
            React.createElement("div", {style:{width:"16px",height:"16px",borderRadius:"50%",background:isSummary?"#c1622f":"rgba(255,255,255,0.06)",border:isSummary?"none":"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"7px",color:isSummary?"#000":"rgba(255,255,255,0.15)",zIndex:1}}, "✦"),
            React.createElement("div", {style:{fontSize:"7px",color:isSummary?"#c1622f":"rgba(255,255,255,0.4)",marginTop:"4px",textTransform:"uppercase"}}, "Ritual")
          )
        )
      );

      if (!entered) return React.createElement("div", {style:{minHeight:"100vh",background:"#0d0d0d",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Georgia,serif",padding:"40px 24px",textAlign:"center"}},
        React.createElement("div", {style:{fontSize:"9px",letterSpacing:"5px",color:"rgba(193,98,47,0.4)",textTransform:"uppercase",marginBottom:"20px"}}, "✦ Mod Bettie Studio ✦"),
        React.createElement("div", {style:{fontSize:"clamp(32px,6vw,52px)",color:"#f0e6d8",fontWeight:"normal",marginBottom:"16px",lineHeight:"1.2"}}, "Aunt Bettie's Closet"),
        React.createElement("div", {style:{fontSize:"clamp(14px,2.5vw,18px)",color:"rgba(193,98,47,0.75)",fontStyle:"italic",marginBottom:"48px",maxWidth:"420px",lineHeight:"1.7"}}, "She'll tell you to wear the damn stripes."),
        React.createElement("button", {onClick:()=>setEntered(true), style:{padding:"16px 40px",border:"1px solid rgba(193,98,47,0.5)",background:"rgba(193,98,47,0.1)",color:"#c1622f",fontSize:"12px",letterSpacing:"3px",textTransform:"uppercase",fontFamily:"Georgia,serif",cursor:"pointer",borderRadius:"30px"}}, "Let's Begin →"),
        React.createElement("div", {style:{marginTop:"60px",fontSize:"11px",color:"rgba(255,255,255,0.12)",letterSpacing:"2px"}}, "modbettie.com")
      );

      return React.createElement("div", {style:{minHeight:"100vh",background:"#0d0d0d",display:"flex",flexDirection:"column",alignItems:"center",fontFamily:"Georgia,serif"}},
        React.createElement("div", {style:{width:"100%",padding:"10px 24px 0",borderBottom:"1px solid rgba(193,98,47,0.08)",background:"rgba(13,13,13,0.95)",position:"sticky",top:0,zIndex:10}},
          React.createElement(ProgressBar)
        ),
        React.createElement("div", {style:{flex:1,width:"100%",maxWidth:"680px",padding:"28px 20px 16px",display:"flex",flexDirection:"column",gap:"22px"}},
          ...messages.map((m, i) => {
            const { clean, choices, multi } = m.role === "assistant" ? parseChoices(m.content) : { clean: m.content, choices: [], multi: false };
            const isLast = m.role === "assistant" && i === messages.length - 1;
            const showC = choices.length > 0 && (isLast || usedChoices.has(`${i}-${choices[0]}`) || usedChoices.has(`${i}-done`));
            const used = choices.length > 0 && (usedChoices.has(`${i}-${choices[0]}`) || usedChoices.has(`${i}-done`));
            return React.createElement("div", {key:i},
              React.createElement("div", {style:{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}},
                m.role==="assistant" && React.createElement("div", {style:{marginRight:"10px",marginTop:"4px",flexShrink:0,opacity:0.65}}, React.createElement(MoonIcon)),
                React.createElement("div", {style:{maxWidth:"82%",padding:"16px 20px",borderRadius:m.role==="user"?"20px 20px 4px 20px":"4px 20px 20px 20px",background:m.role==="user"?"linear-gradient(135deg,#c1622f,#8b3d1a)":"rgba(255,255,255,0.03)",border:m.role==="user"?"none":"1px solid rgba(193,98,47,0.09)",color:m.role==="user"?"#fdf0e6":"#e8ddd0",fontSize:"15px",lineHeight:"1.75"}},
                  ...renderText(clean)
                )
              ),
              showC && !multi && !used && React.createElement("div", {style:{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"10px",marginLeft:"34px"}},
                ...choices.map((c, ci) => React.createElement("button", {key:ci, onClick:()=>handleChoice(c,i), style:{padding:"9px 16px",border:"1px solid rgba(193,98,47,0.25)",background:"transparent",color:"rgba(240,230,216,0.65)",fontSize:"13px",fontFamily:"Georgia,serif",fontStyle:"italic",cursor:"pointer",borderRadius:"30px"}}, c))
              ),
              showC && multi && !usedChoices.has(`${i}-done`) && React.createElement("div", {style:{marginTop:"10px",marginLeft:"34px"}},
                React.createElement("div", {style:{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"12px"}},
                  ...choices.map((c, ci) => {
                    const sel = (multiSelections[i] || new Set()).has(c);
                    return React.createElement("button", {key:ci, onClick:()=>toggleMulti(i,c), style:{padding:"9px 16px",border:`1px solid ${sel?"rgba(193,98,47,0.6)":"rgba(193,98,47,0.25)"}`,background:sel?"rgba(193,98,47,0.15)":"transparent",color:sel?"#c1622f":"rgba(240,230,216,0.65)",fontSize:"13px",fontFamily:"Georgia,serif",fontStyle:"italic",cursor:"pointer",borderRadius:"30px"}}, c);
                  })
                ),
                React.createElement("button", {onClick:()=>submitMulti(i), disabled:!(multiSelections[i]?.size>0), style:{padding:"10px 24px",border:"1px solid rgba(193,98,47,0.5)",background:"rgba(193,98,47,0.15)",color:"#c1622f",fontSize:"12px",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"Georgia,serif",cursor:"pointer",borderRadius:"30px"}}, "That's me →")
              )
            );
          }),
          isSummary && React.createElement("div", {style:{display:"flex",gap:"12px",justifyContent:"center",flexWrap:"wrap",padding:"8px 0"}},
            React.createElement("button", {onClick:()=>setShowResults(true), style:{padding:"12px 24px",border:"1px solid rgba(193,98,47,0.5)",background:"rgba(193,98,47,0.1)",color:"#c1622f",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",cursor:"pointer",fontFamily:"Georgia,serif",borderRadius:"30px"}}, "✦ View Your Style Card"),
            React.createElement("button", {onClick:()=>setShowPhotog(true), style:{padding:"12px 24px",border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.03)",color:"rgba(255,255,255,0.4)",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",cursor:"pointer",fontFamily:"Georgia,serif",borderRadius:"30px"}}, "Photographer Brief")
          ),
          loading && React.createElement("div", {style:{display:"flex",justifyContent:"flex-start",alignItems:"center",gap:"10px"}},
            React.createElement("div", {style:{opacity:0.6}}, React.createElement(MoonIcon)),
            React.createElement("div", {style:{padding:"16px 20px",borderRadius:"4px 20px 20px 20px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(193,98,47,0.09)",display:"flex",gap:"7px",alignItems:"center"}},
              ...[0,1,2].map(n => React.createElement("div", {key:n, style:{width:"5px",height:"5px",borderRadius:"50%",background:"#c1622f",animation:"br 1.4s ease-in-out infinite",animationDelay:`${n*0.25}s`}}))
            )
          ),
          React.createElement("div", {ref:bottomRef})
        ),
        React.createElement("div", {style:{width:"100%",maxWidth:"680px",borderTop:"1px solid rgba(193,98,47,0.07)"}}),
        React.createElement("div", {style:{width:"100%",maxWidth:"680px",padding:"14px 20px 28px",display:"flex",gap:"10px",alignItems:"flex-end"}},
          React.createElement("textarea", {value:input, onChange:e=>setInput(e.target.value), onKeyDown:handleKey, placeholder:"Or type your own answer…", rows:1, style:{flex:1,padding:"13px 16px",borderRadius:"14px",border:"1px solid rgba(193,98,47,0.18)",background:"rgba(255,255,255,0.03)",color:"#e8ddd0",fontSize:"15px",fontFamily:"Georgia,serif",resize:"none",outline:"none",lineHeight:"1.6"}}),
          React.createElement("button", {onClick:()=>sendMessage(input), disabled:loading||!input.trim(), style:{width:"44px",height:"44px",borderRadius:"50%",border:"1px solid rgba(193,98,47,0.3)",background:loading||!input.trim()?"transparent":"rgba(193,98,47,0.15)",color:loading||!input.trim()?"rgba(193,98,47,0.2)":"#c1622f",fontSize:"17px",cursor:loading||!input.trim()?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",flexShrink:0}}, "→")
        ),
        React.createElement("style", null, "@keyframes br{0%,100%{opacity:0.2;transform:scale(0.7)}50%{opacity:1;transform:scale(1.2)}}textarea::placeholder{color:rgba(232,221,208,0.18)}textarea:focus{border-color:rgba(193,98,47,0.35)}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(193,98,47,0.12)}")
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
