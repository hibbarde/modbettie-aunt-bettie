<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aunt Bettie's Closet</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const MODULES = [
      { id: 1, name: "Arrival", symbol: "✦" },
      { id: 2, name: "Self", symbol: "◎" },
      { id: 3, name: "Support", symbol: "◇" },
      { id: 4, name: "Style", symbol: "◉" },
      { id: 5, name: "Closet", symbol: "◈" },
      { id: 6, name: "Ritual", symbol: "✧" },
    ];

    const WELCOME = [
      "[MODULE:1]",
      "",
      "**Meet Your Aunt Bettie.**",
      "",
      "She's not here to ask what colors you \"usually gravitate toward\" and then pat herself on the back like she solved your soul in a cardigan.",
      "",
      "She's here to help you get honest about who's showing up for this session — *and what that version of you wants to wear when she's done hiding in sensible fabric.*",
      "",
      "We'll get to the wardrobe. First, we figure out who we're dressing.",
      "",
      "**Before we talk about a single piece of clothing — when you imagine seeing your final images for the first time, what do you want to feel?**",
      "[CHOICES: Seen. Actually seen. | Terrifyingly beautiful | Soft and undeniable | Powerful in a quiet way | Free from the version everyone else knows]"
    ].join("\n");

    const WELCOME_RETURNING = [
      "[MODULE:1]",
      "",
      "**Welcome back.**",
      "",
      "You've already done the work. Now let's go deeper.",
      "",
      "**Did you spend some time with me before you booked?**",
      "[CHOICES: Yes, I have my Style Card | Starting fresh]"
    ].join("\n");

    const SYSTEM_PROMPT = [
      "You are Aunt Bettie — the warmhearted, wise, and deeply perceptive AI style guide for Mod Bettie, an empowerment portrait studio. You are NOT a styling bot. You are the aunt everyone wishes they had: the one who tells you the truth with love, who sees who you really are, and helps you show up fully for your photo session.",
      "",
      "Your core belief: clothing is not a costume for a fake self. Clothing is a bridge to a real part of self that wants more room.",
      "",
      "YOUR TONE: Warm, grounded, observant. Never clinical. Never 'you go girl' sludge. Lightly poetic but always accessible. Occasionally dry and funny. Short, direct sentences.",
      "",
      "RETURNING CLIENT FLOW:",
      "If the client says 'Yes, I have my Style Card' — ask them to paste it, then read it carefully and skip all identity/emotional modules. Go straight to Closet Reality and wardrobe depth. Reference what their card said specifically.",
      "If they say 'Starting fresh' — run the full conversation from Module 1 as normal.",
      "",
      "- Maximum 14 assistant turns before delivering the final summary",
      "- Each module: 1 setup line, 1-2 choice prompts, at most 1 open question",
      "- After any open question, if the answer is thin or vague, offer rescue choices instead of asking another abstract question",
      "- Reflect briefly then advance. Do not restate and re-ask the same thing in a prettier hat",
      "- Optimize for: fast emotional accuracy + clear wardrobe translation + strong final summary",
      "",
      "HIDDEN SCORING — track internally, never mention to user:",
      "As the conversation progresses, score these dimensions low/medium/high based on answers:",
      "Structure | Softness | Drama | Exposure | Polish | Mystery | Boldness | Practicality",
      "",
      "Map to style archetypes:",
      "- Grounded Edge: high structure + high boldness + medium drama",
      "- Quiet Authority: high polish + high structure + low exposure",
      "- Soft Power: high softness + medium polish + medium mystery",
      "- Ceremony/Drama: high drama + high exposure + high boldness",
      "- Sensual Ease: high softness + high exposure + low structure",
      "- Unexpected Wildcard: high mystery + high boldness + low polish",
      "- Romantic Structure: high softness + high structure + medium drama",
      "- Editorial Minimalist: high polish + high mystery + low boldness",
      "",
      "Use the top 2-3 archetypes to build the wardrobe directions. Session context modifies garment choices. Body/support answers modify silhouette and fabric. Closet reality answers modify how ambitious the shopping list becomes.",
      "",
      "YOUR STRUCTURE — 6 modules in order:",
      "MODULE 1 — ARRIVAL",
      "MODULE 2 — SELF (identity + session context)",
      "MODULE 3 — SUPPORT (body needs)",
      "MODULE 4 — STYLE (visual translation)",
      "MODULE 5 — CLOSET REALITY (practical bridge)",
      "MODULE 6 — SUMMARY",
      "",
      "CRITICAL RULES:",
      "1. The VERY FIRST characters of EVERY response must be [MODULE:X] on its own line, nothing before it, no dashes. Then a line break, then your response. Never write --- before the module tag. Never write [MODULE:X] anywhere except the very first line.",
      "2. For choices append ONLY at the very end: [CHOICES: opt1 | opt2] or [CHOICES:MULTI: opt1 | opt2] for multi-select.",
      "3. Session context belongs in Module 2 — ask it softly, not as a form field.",
      "",
      "MODULE 1 — ARRIVAL (2 questions max):",
      "'Before we talk about a single piece of clothing — when you imagine seeing your final images for the first time, what do you want to feel?'",
      "[CHOICES: Seen. Actually seen. | Terrifyingly beautiful | Soft and undeniable | Powerful in a quiet way | Free from the version everyone else knows]",
      "",
      "Then:",
      "'Be honest. Which one is more you right now?'",
      "[CHOICES: I know exactly what I want but I'm scared to actually want it | I have no idea what I want and that's also terrifying | Somewhere in the middle pretending I have it together | More ready than I'm letting on]",
      "",
      "MODULE 2 — SELF (3 questions):",
      "Feelings wheel — multi-select:",
      "'Which of these also live in the room with you right now? Pick all that feel true.'",
      "[CHOICES:MULTI: Proud | Vulnerable | Hopeful | Exposed | Brave | Tender | Uncertain | Inspired | Powerful | Ready]",
      "",
      "Session context — soft, multi-select:",
      "'What are we dressing for today? Pick everything that applies.'",
      "[CHOICES:MULTI: Branding presence | Soft portrait / beauty | Sensual / boudoir | Drama / gown / editorial | A little of everything]",
      "",
      "Identity:",
      "'The version of you showing up — has she been waiting long?'",
      "[CHOICES: Honestly, years | She shows up sometimes but never gets the mic | She's new. I'm still meeting her. | She's been here. I just needed permission.]",
      "",
      "Then ONE question with choices AND optional open text:",
      "'What does she want the world to stop getting wrong about her?'",
      "[CHOICES: That I'm only one thing | That I'm too much | That I'm not enough | That I'm fine when I'm not | That I don't take up space on purpose | That I'm easy to overlook | That I've already peaked | That I need to tone it down]",
      "",
      "MODULE 3 — SUPPORT (2 questions):",
      "'What does your body need from clothing to feel like it's on your side?'",
      "[CHOICES: Structure — hold me together | Softness — don't restrict me | Coverage — I choose what's seen | Ease — I need to forget I'm dressed | Drama — I want to feel it when I move]",
      "",
      "'Any fabrics that feel like home?'",
      "[CHOICES: Silk or satin | Cotton or linen | Knit or cashmere | Leather or denim | Lace or chiffon | I wear whatever doesn't itch]",
      "",
      "MODULE 4 — STYLE (3 questions):",
      "'If this version of you walked into a room, what would people feel before she said a word?'",
      "[CHOICES: That she means it | That she's softer than she looks | That she's more than they expected | That she's arrived | That she's interesting and they can't say why]",
      "",
      "'She wears color like...'",
      "[CHOICES: Punctuation — one sharp pop | Poetry — layered and soft | Armor — dark and deliberate | Mystery — deep and unexpected | Celebration — seen from across the room]",
      "",
      "'Her silhouette — which feels most true?'",
      "[CHOICES: Tailored and intentional | Fluid and moving | Fitted and present | Covered and powerful | Revealed and brave]",
      "",
      "MODULE 5 — CLOSET REALITY (3-4 questions):",
      "Transition warmly: 'Now let's get practical before we go full peacock.'",
      "",
      "'What do you already have to work with?'",
      "[CHOICES: A strong jacket or blazer | Boots or shoes with presence | A dress that almost works | Good basics, no magic | Honestly, not much]",
      "",
      "'Where do you want the moment to live?'",
      "[CHOICES: The jacket | The dress | The neckline | The shoes | The jewelry | The texture | The color]",
      "",
      "'What do you actually need from me here?'",
      "[CHOICES: Help me shop for one anchor piece | Help me build full outfits | Help me style what I already own | Help me split into multiple looks | All of the above, obviously]",
      "",
      "If mixed session — ask:",
      "'We're dressing for more than one mood. Which lanes do we need?'",
      "[CHOICES:MULTI: Polished / professional | Soft / beautiful | Sensual / skin-forward | Dramatic / editorial | Playful wildcard]",
      "",
      "MODULE 6 — DELIVER THE FULL SUMMARY immediately using [MODULE:SUMMARY].",
      "",
      "FINAL SUMMARY FORMAT — this is your most important output. Be tactical and specific. Do not stay vague. Translate everything into actual styling direction.",
      "",
      "[MODULE:SUMMARY]",
      "",
      "✦ SESSION STYLE ESSENCE: (2-5 word poetic phrase capturing style identity)",
      "",
      "✦ WHO WE'RE DRESSING: (2-3 inner parts or energies that showed up)",
      "",
      "✦ THE BIG IDEA: (short paragraph — what this wardrobe is doing emotionally and visually)",
      "",
      "LOOK 1 — [archetype name]",
      "What it's for: (mood / lane / part of self this serves)",
      "Outfit formula: (e.g. structured blazer + fitted knit + straight-leg jeans + pointed boots)",
      "Key pieces:",
      "- item 1",
      "- item 2",
      "- item 3",
      "- item 4",
      "- item 5",
      "Best textures/fabrics: (2-4 concrete suggestions)",
      "Best colors: (3-5 specific color directions)",
      "Where the moment lives: (jacket / neckline / dress / shoe / jewelry / color / texture)",
      "Avoid if it feels wrong: (one short sentence)",
      "",
      "LOOK 2 — [archetype name]",
      "(same structure)",
      "",
      "LOOK 3 — [archetype name]",
      "(same structure — if mixed session add Look 4)",
      "",
      "✦ PULL FROM YOUR CLOSET FIRST:",
      "(practical checklist of what to look for before shopping)",
      "",
      "✦ SHOP FOR THESE FIRST:",
      "(3-5 highest priority items in order of importance)",
      "",
      "✦ SEARCH TERMS:",
      "(8-15 highly usable search terms for Google, Pinterest, Shopbop, Revolve, Anthropologie, Zara, Nordstrom)",
      "",
      "✦ IF BUILDING MULTIPLE LOOKS, SPLIT THEM LIKE THIS:",
      "(assign which look serves which mood/session if mixed)",
      "",
      "✦ IMAGE/MOOD BOARD TAGS:",
      "(3-6 short tags for pulling styling inspiration)",
      "",
      "✦ A NOTE TO CARRY INTO YOUR SESSION:",
      "(personal, specific, memorable — in Aunt Bettie's voice)",
      "",
      "---PHOTOGRAPHER SUMMARY---",
      "✦ CLIENT ENERGY: (1-2 sentences)",
      "✦ EMOTIONAL ANCHORS: (what this session means to this specific client)",
      "✦ STYLING LANES TO PREP FOR: (visual directions to be ready to support)",
      "✦ SESSION PREP NOTES: (confidence, coaching, pacing, posing, or support notes)",
      "✦ WARDROBE NOTES: (specific things to watch for in fit, structure, movement, exposure, layering)",
      "",
      "NEVER: ask what to hide / body-shame / flood with questions / rush / restate the same question twice."
    ].join("\n");

    const isReturning = window.location.search.includes("returning=true");

    const parseModule = (text) => { const m = text.match(/^\[MODULE:(\w+)\]/); return m ? m[1] : null; };
    const stripModuleTag = (text) => text.replace(/^\[MODULE:\w+\]\n?/, "");
    const parseChoices = (text) => {
      const multiMatch = text.match(/\[CHOICES:MULTI:\s*([^\]]+)\]/);
      const singleMatch = text.match(/\[CHOICES:\s*([^\]]+)\]/);
      const match = multiMatch || singleMatch;
      if (!match) return { clean: text, choices: [], multi: false };
      const choices = match[1].split("|").map(c => c.trim()).filter(Boolean);
      const multi = !!multiMatch || choices.length > 6;
      const clean = text.replace(/\[CHOICES:(?:MULTI:)?\s*[^\]]+\]/, "").trimEnd();
      return { clean, choices, multi };
    };

    const MoonIcon = () => (
      <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="11" stroke="#c1622f" strokeWidth="1.5" fill="none"/>
        <circle cx="14" cy="14" r="7" fill="#c1622f" opacity="0.15"/>
        <path d="M14 3 C8 3 3 8 3 14 C3 20 8 25 14 25 C11 22 9 18 9 14 C9 10 11 6 14 3Z" fill="#c1622f" opacity="0.3"/>
      </svg>
    );

    const ResultsCard = ({ summary, onClose }) => {
      const clean = summary.replace(/^\[MODULE:SUMMARY\]\n?/, "");
      const clientPart = clean.split("---PHOTOGRAPHER SUMMARY---")[0];
      const lines = clientPart.split("\n");
      const renderLines = () => lines.map((line, i) => {
        if (line.trim() === "") return <div key={i} style={{height:"0.5em"}}/>;
        if (line.startsWith("LOOK ") && line.includes("—")) return (
          <div key={i} style={{marginTop:"20px",marginBottom:"8px",paddingBottom:"6px",borderBottom:"1px solid rgba(193,98,47,0.2)"}}>
            <div style={{fontSize:"11px",letterSpacing:"2px",color:"#c1622f",textTransform:"uppercase",fontFamily:"Georgia,serif",fontWeight:"bold"}}>{line}</div>
          </div>
        );
        if (line.startsWith("✦")) return (
          <div key={i} style={{marginTop:"16px",marginBottom:"6px"}}>
            <div style={{fontSize:"9px",letterSpacing:"3px",color:"rgba(193,98,47,0.6)",textTransform:"uppercase",marginBottom:"4px"}}>{line.replace("✦","").split(":")[0].trim()}</div>
            <div style={{fontSize:"14px",color:"#f0e6d8",fontFamily:"Georgia,serif",fontStyle:"italic"}}>{line.split(":").slice(1).join(":").trim()}</div>
          </div>
        );
        if (line.startsWith("- ")) return (
          <div key={i} style={{fontSize:"13px",color:"#e8ddd0",fontFamily:"Georgia,serif",lineHeight:"1.7",paddingLeft:"12px"}}>· {line.slice(2)}</div>
        );
        const isLabel = line.endsWith(":") || (line.includes(":") && line.split(":")[0].length < 40 && !line.startsWith(" "));
        if (isLabel) return (
          <div key={i} style={{fontSize:"9px",letterSpacing:"2px",color:"rgba(193,98,47,0.5)",textTransform:"uppercase",marginTop:"10px",marginBottom:"3px"}}>{line}</div>
        );
        return <div key={i} style={{fontSize:"13px",color:"#e8ddd0",fontFamily:"Georgia,serif",lineHeight:"1.7"}}>{line}</div>;
      });
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",overflowY:"auto"}}>
          <div style={{background:"#0a0604",border:"1px solid rgba(193,98,47,0.3)",maxWidth:"520px",width:"100%",padding:"36px 32px",position:"relative",maxHeight:"90vh",overflowY:"auto"}}>
            <button onClick={onClose} style={{position:"absolute",top:"16px",right:"16px",background:"none",border:"none",color:"rgba(193,98,47,0.5)",fontSize:"20px",cursor:"pointer"}}>✕</button>
            <div style={{textAlign:"center",marginBottom:"24px",paddingBottom:"20px",borderBottom:"1px solid rgba(193,98,47,0.15)"}}>
              <div style={{fontSize:"9px",letterSpacing:"4px",color:"rgba(193,98,47,0.5)",textTransform:"uppercase",marginBottom:"10px"}}>✦ Mod Bettie Studio ✦</div>
              <div style={{fontSize:"22px",color:"#f0e6d8",fontFamily:"Georgia,serif",fontWeight:"normal",marginBottom:"4px"}}>Aunt Bettie's Closet</div>
              <div style={{fontSize:"11px",color:"rgba(193,98,47,0.6)",fontStyle:"italic",fontFamily:"Georgia,serif"}}>Your Personal Wardrobe Ritual</div>
            </div>
            {renderLines()}
            <div style={{textAlign:"center",marginTop:"24px",fontSize:"9px",color:"rgba(193,98,47,0.25)",letterSpacing:"3px"}}>✦ modbettie.com ✦</div>
            {!isReturning && (
              <div style={{textAlign:"center",marginTop:"20px"}}>
                <a href="https://www.modbettie.com/byo" style={{display:"inline-block",padding:"14px 32px",border:"1px solid rgba(193,98,47,0.6)",background:"rgba(193,98,47,0.12)",color:"#c1622f",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",fontFamily:"Georgia,serif",textDecoration:"none",borderRadius:"30px"}}>
                  Book Your Session →
                </a>
              </div>
            )}
          </div>
        </div>
      );
    };

    const PhotographerSummary = ({ summary, onClose }) => {
      const lines = summary.split("\n").filter(l => l.trim());
      const idx = lines.findIndex(l => l.includes("---PHOTOGRAPHER SUMMARY---"));
      const photoLines = idx > -1 ? lines.slice(idx + 1) : [];
      const get = (key) => photoLines.find(l => l.includes(key))?.split(":").slice(1).join(":").trim() || "";
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",overflowY:"auto"}}>
          <div style={{background:"#080808",border:"1px solid rgba(255,255,255,0.1)",maxWidth:"480px",width:"100%",padding:"36px 32px",position:"relative",maxHeight:"90vh",overflowY:"auto"}}>
            <button onClick={onClose} style={{position:"absolute",top:"16px",right:"16px",background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:"20px",cursor:"pointer"}}>✕</button>
            <div style={{marginBottom:"24px",paddingBottom:"16px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
              <div style={{fontSize:"9px",letterSpacing:"4px",color:"rgba(255,255,255,0.25)",textTransform:"uppercase",marginBottom:"8px"}}>Photographer Session Brief</div>
              <div style={{fontSize:"18px",color:"#f0e6d8",fontFamily:"Georgia,serif",fontWeight:"normal"}}>Client Summary</div>
              <div style={{fontSize:"11px",color:"rgba(255,255,255,0.3)",fontFamily:"Georgia,serif",fontStyle:"italic",marginTop:"4px"}}>Prepared by Aunt Bettie · Mod Bettie Studio</div>
            </div>
            {[
              {label:"Client Energy", key:"CLIENT ENERGY", accent:true},
              {label:"Emotional Anchors", key:"EMOTIONAL ANCHORS"},
              {label:"Session Prep Notes", key:"SESSION PREP NOTES"},
              {label:"Wardrobe Notes", key:"WARDROBE NOTES"}
            ].map(({label, key, accent}) => {
              const val = get(key);
              return val ? (
                <div key={key} style={{marginBottom:"20px"}}>
                  <div style={{fontSize:"9px",letterSpacing:"3px",color:accent?"#c1622f":"rgba(255,255,255,0.3)",textTransform:"uppercase",marginBottom:"8px"}}>{label}</div>
                  <div style={{fontSize:"14px",color:"#e8ddd0",fontFamily:"Georgia,serif",lineHeight:"1.8",paddingLeft:"12px",borderLeft:`2px solid ${accent?"rgba(193,98,47,0.4)":"rgba(255,255,255,0.1)"}`}}>{val}</div>
                </div>
              ) : null;
            })}
            <div style={{marginTop:"24px",padding:"14px",background:"rgba(193,98,47,0.05)",border:"1px solid rgba(193,98,47,0.1)"}}>
              <div style={{fontSize:"11px",color:"rgba(193,98,47,0.5)",fontFamily:"Georgia,serif",fontStyle:"italic",lineHeight:"1.7",textAlign:"center"}}>This summary was generated from a client conversation with Aunt Bettie and is intended for studio use only.</div>
            </div>
            <div style={{textAlign:"center",marginTop:"20px",fontSize:"9px",color:"rgba(255,255,255,0.1)",letterSpacing:"3px"}}>✦ modbettie.com ✦</div>
          </div>
        </div>
      );
    };

    function App() {
      const [entered, setEntered] = useState(false);
      const [messages, setMessages] = useState([{ role: "assistant", content: isReturning ? WELCOME_RETURNING : WELCOME }]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [currentModule, setCurrentModule] = useState(1);
      const [showResults, setShowResults] = useState(false);
      const [showPhotog, setShowPhotog] = useState(false);
      const [summaryText, setSummaryText] = useState("");
      const [usedChoices, setUsedChoices] = useState(new Set());
      const [multiSelections, setMultiSelections] = useState({});
      const bottomRef = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

      if (!entered) return (
        <div style={{minHeight:"100vh",background:"#0d0d0d",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Georgia,serif",padding:"40px 24px",textAlign:"center"}}>
          <div style={{fontSize:"9px",letterSpacing:"5px",color:"rgba(193,98,47,0.4)",textTransform:"uppercase",marginBottom:"20px"}}>✦ Mod Bettie Studio ✦</div>
          <div style={{fontSize:"clamp(32px,6vw,52px)",color:"#f0e6d8",fontWeight:"normal",marginBottom:"16px",lineHeight:"1.2"}}>Aunt Bettie's Closet</div>
          <div style={{fontSize:"clamp(14px,2.5vw,18px)",color:"rgba(193,98,47,0.75)",fontStyle:"italic",marginBottom:"48px",maxWidth:"420px",lineHeight:"1.7"}}>She'll tell you to wear the damn stripes.</div>
          <button
            onClick={() => setEntered(true)}
            style={{padding:"16px 40px",border:"1px solid rgba(193,98,47,0.5)",background:"rgba(193,98,47,0.1)",color:"#c1622f",fontSize:"12px",letterSpacing:"3px",textTransform:"uppercase",fontFamily:"Georgia,serif",cursor:"pointer",borderRadius:"30px",transition:"all 0.3s"}}
            onMouseOver={e => e.target.style.background="rgba(193,98,47,0.2)"}
            onMouseOut={e => e.target.style.background="rgba(193,98,47,0.1)"}
          >
            Let's Begin →
          </button>
          <div style={{marginTop:"60px",fontSize:"11px",color:"rgba(255,255,255,0.12)",letterSpacing:"2px"}}>modbettie.com</div>
        </div>
      );

      const toggleMulti = (msgIndex, choice) => {
        setMultiSelections(prev => {
          const current = new Set(prev[msgIndex] || []);
          current.has(choice) ? current.delete(choice) : current.add(choice);
          return { ...prev, [msgIndex]: current };
        });
      };

      const submitMulti = (msgIndex) => {
        const selected = multiSelections[msgIndex];
        if (!selected || selected.size === 0) return;
        const text = Array.from(selected).join(", ");
        setUsedChoices(prev => new Set([...prev, `${msgIndex}-done`]));
        sendMessage(text);
      };

      const sendMessage = async (text) => {
        if (!text.trim() || loading) return;
        const updated = [...messages, { role: "user", content: text }];
        setMessages(updated);
        setInput("");
        setLoading(true);
        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1500,
              system: SYSTEM_PROMPT,
              messages: updated.map(m => ({ role: m.role, content: stripModuleTag(m.content).replace(/\[CHOICES:(?:MULTI:)?[^\]]+\]/g, "") }))
            })
          });
          const data = await res.json();
          const reply = data.content?.[0]?.text || "Something interrupted us — please try again.";
          const mod = parseModule(reply);
          if (mod === "SUMMARY") { setSummaryText(reply); setCurrentModule(7); }
          else if (mod) setCurrentModule(parseInt(mod));
          setMessages(prev => [...prev, { role: "assistant", content: reply }]);
        } catch(e) {
          setMessages(prev => [...prev, { role: "assistant", content: "Something interrupted us — please try again." }]);
        }
        setLoading(false);
      };

      const handleChoice = (choice, msgIndex) => {
        const key = `${msgIndex}-${choice}`;
        if (usedChoices.has(key)) return;
        setUsedChoices(prev => new Set([...prev, key]));
        sendMessage(choice);
      };

      const handleKey = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(input); } };

      const renderText = (text) => {
        const clean = stripModuleTag(text).replace(/\[CHOICES:(?:MULTI:)?[^\]]+\]/g, "").trimEnd();
        return clean.split("\n").map((line, i) => {
          if (line === "") return <div key={i} style={{ height: "0.4em" }} />;
          if (line.includes("---PHOTOGRAPHER SUMMARY---")) return null;
          if (line.trim() === "---") return null;
          if (line.match(/^\[MODULE:\w+\]$/)) return null;
          const parts = line.split(/(\*\*[^*]+\*\*|\*[^*]+\*)/g).map((p, j) => {
            if (p.startsWith("**") && p.endsWith("**")) return <strong key={j}>{p.slice(2,-2)}</strong>;
            if (p.startsWith("*") && p.endsWith("*")) return <em key={j}>{p.slice(1,-1)}</em>;
            return p;
          });
          return <p key={i} style={{ margin: "0.2em 0", lineHeight: "1.75" }}>{parts}</p>;
        });
      };

      const isSummary = currentModule === 7;

      const ProgressBar = () => (
        <div style={{width:"100%",padding:"12px 20px 0"}}>
          <div style={{display:"flex",alignItems:"center"}}>
            {MODULES.map((mod, i) => (
              <div key={mod.id} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",position:"relative"}}>
                {i < MODULES.length && <div style={{position:"absolute",top:"8px",left:"50%",width:"100%",height:"1px",background:currentModule>mod.id?"rgba(193,98,47,0.5)":"rgba(255,255,255,0.2)",transition:"background 0.5s"}}/>}
                <div style={{width:"16px",height:"16px",borderRadius:"50%",background:currentModule>mod.id?"#c1622f":currentModule===mod.id?"rgba(193,98,47,0.3)":"rgba(255,255,255,0.06)",border:currentModule===mod.id?"1px solid #c1622f":currentModule>mod.id?"none":"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"7px",color:currentModule>mod.id?"#000":currentModule===mod.id?"#c1622f":"rgba(255,255,255,0.2)",zIndex:1,transition:"all 0.4s",flexShrink:0}}>
                  {currentModule>mod.id?"✓":mod.symbol}
                </div>
                <div style={{fontSize:"7px",color:currentModule===mod.id?"#c1622f":currentModule>mod.id?"rgba(193,98,47,0.7)":"rgba(255,255,255,0.4)",marginTop:"4px",textTransform:"uppercase",whiteSpace:"nowrap"}}>{mod.name}</div>
              </div>
            ))}
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{width:"16px",height:"16px",borderRadius:"50%",background:isSummary?"#c1622f":"rgba(255,255,255,0.06)",border:isSummary?"none":"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"7px",color:isSummary?"#000":"rgba(255,255,255,0.15)",zIndex:1}}>✦</div>
              <div style={{fontSize:"7px",color:isSummary?"#c1622f":"rgba(255,255,255,0.4)",marginTop:"4px",textTransform:"uppercase"}}>Ritual</div>
            </div>
          </div>
        </div>
      );

      return (
        <div style={{minHeight:"100vh",background:"transparent",display:"flex",flexDirection:"column",alignItems:"center",fontFamily:"Georgia,serif"}}>
          {showResults && summaryText && <ResultsCard summary={summaryText} onClose={()=>setShowResults(false)}/>}
          {showPhotog && summaryText && <PhotographerSummary summary={summaryText} onClose={()=>setShowPhotog(false)}/>}

          <div style={{width:"100%",padding:"10px 24px 0",borderBottom:"1px solid rgba(193,98,47,0.08)",background:"transparent",position:"sticky",top:0,zIndex:10}}>
            <ProgressBar/>
          </div>

          <div style={{flex:1,width:"100%",maxWidth:"680px",padding:"28px 20px 16px",display:"flex",flexDirection:"column",gap:"22px"}}>
            {messages.map((m, i) => {
              const { clean, choices, multi } = m.role === "assistant" ? parseChoices(m.content) : { clean: m.content, choices: [], multi: false };
              const isLastAssistant = m.role === "assistant" && i === messages.length - 1;
              const choicesUsed = choices.length > 0 && (usedChoices.has(`${i}-${choices[0]}`) || usedChoices.has(`${i}-done`));
              const showChoices = choices.length > 0 && (isLastAssistant || choicesUsed);
              return (
                <div key={i}>
                  <div style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                    {m.role==="assistant" && <div style={{marginRight:"10px",marginTop:"4px",flexShrink:0,opacity:0.65}}><MoonIcon/></div>}
                    <div style={{maxWidth:"82%",padding:"16px 20px",borderRadius:m.role==="user"?"20px 20px 4px 20px":"4px 20px 20px 20px",background:m.role==="user"?"linear-gradient(135deg,#c1622f,#8b3d1a)":"rgba(255,255,255,0.03)",border:m.role==="user"?"none":"1px solid rgba(193,98,47,0.09)",color:m.role==="user"?"#fdf0e6":"#e8ddd0",fontSize:"15px",lineHeight:"1.75"}}>
                      {renderText(clean)}
                    </div>
                  </div>
                  {showChoices && !multi && !choicesUsed && (
                    <div style={{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"10px",marginLeft:"34px"}}>
                      {choices.map((choice, ci) => (
                        <button key={ci} onClick={()=>handleChoice(choice, i)} disabled={choicesUsed}
                          style={{padding:"9px 16px",border:"1px solid rgba(193,98,47,0.25)",background:"transparent",color:"rgba(240,230,216,0.65)",fontSize:"13px",fontFamily:"Georgia,serif",fontStyle:"italic",cursor:"pointer",borderRadius:"30px",transition:"all 0.2s"}}>
                          {choice}
                        </button>
                      ))}
                    </div>
                  )}
                  {showChoices && multi && !usedChoices.has(`${i}-done`) && (
                    <div style={{marginTop:"10px",marginLeft:"34px"}}>
                      <div style={{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"12px"}}>
                        {choices.map((choice, ci) => {
                          const selected = (multiSelections[i] || new Set()).has(choice);
                          return (
                            <button key={ci} onClick={()=>toggleMulti(i, choice)}
                              style={{padding:"9px 16px",border:`1px solid ${selected?"rgba(193,98,47,0.6)":"rgba(193,98,47,0.25)"}`,background:selected?"rgba(193,98,47,0.15)":"transparent",color:selected?"#c1622f":"rgba(240,230,216,0.65)",fontSize:"13px",fontFamily:"Georgia,serif",fontStyle:"italic",cursor:"pointer",borderRadius:"30px",transition:"all 0.2s"}}>
                              {choice}
                            </button>
                          );
                        })}
                      </div>
                      <button onClick={()=>submitMulti(i)} disabled={!(multiSelections[i]?.size > 0)}
                        style={{padding:"10px 24px",border:"1px solid rgba(193,98,47,0.5)",background:"rgba(193,98,47,0.15)",color:"#c1622f",fontSize:"12px",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"Georgia,serif",cursor:"pointer",borderRadius:"30px"}}>
                        That's me →
                      </button>
                    </div>
                  )}
                </div>
              );
            })}

            {isSummary && (
              <div style={{display:"flex",gap:"12px",justifyContent:"center",flexWrap:"wrap",padding:"8px 0"}}>
                <button onClick={()=>setShowResults(true)} style={{padding:"12px 24px",border:"1px solid rgba(193,98,47,0.5)",background:"rgba(193,98,47,0.1)",color:"#c1622f",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",cursor:"pointer",fontFamily:"Georgia,serif",borderRadius:"30px"}}>✦ View Your Style Card</button>
                <button onClick={()=>setShowPhotog(true)} style={{padding:"12px 24px",border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.03)",color:"rgba(255,255,255,0.4)",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",cursor:"pointer",fontFamily:"Georgia,serif",borderRadius:"30px"}}>Photographer Brief</button>
              </div>
            )}

            {loading && (
              <div style={{display:"flex",justifyContent:"flex-start",alignItems:"center",gap:"10px"}}>
                <div style={{opacity:0.6}}><MoonIcon/></div>
                <div style={{padding:"16px 20px",borderRadius:"4px 20px 20px 20px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(193,98,47,0.09)",display:"flex",gap:"7px",alignItems:"center"}}>
                  {[0,1,2].map(n=><div key={n} style={{width:"5px",height:"5px",borderRadius:"50%",background:"#c1622f",animation:"br 1.4s ease-in-out infinite",animationDelay:`${n*0.25}s`}}/>)}
                </div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          <div style={{width:"100%",maxWidth:"680px",borderTop:"1px solid rgba(193,98,47,0.07)"}}/>
          <div style={{width:"100%",maxWidth:"680px",padding:"14px 20px 28px",display:"flex",gap:"10px",alignItems:"flex-end"}}>
            <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey}
              placeholder="Or type your own answer…" rows={1}
              style={{flex:1,padding:"13px 16px",borderRadius:"14px",border:"1px solid rgba(193,98,47,0.18)",background:"rgba(255,255,255,0.03)",color:"#e8ddd0",fontSize:"15px",fontFamily:"Georgia,serif",resize:"none",outline:"none",lineHeight:"1.6"}}/>
            <button onClick={()=>sendMessage(input)} disabled={loading||!input.trim()}
              style={{width:"44px",height:"44px",borderRadius:"50%",border:"1px solid rgba(193,98,47,0.3)",background:loading||!input.trim()?"transparent":"rgba(193,98,47,0.15)",color:loading||!input.trim()?"rgba(193,98,47,0.2)":"#c1622f",fontSize:"17px",cursor:loading||!input.trim()?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",flexShrink:0}}>→</button>
          </div>

          <style>{`
            @keyframes br{0%,100%{opacity:0.2;transform:scale(0.7)}50%{opacity:1;transform:scale(1.2)}}
            textarea::placeholder{color:rgba(232,221,208,0.18)}
            textarea:focus{border-color:rgba(193,98,47,0.35)}
            ::-webkit-scrollbar{width:3px}
            ::-webkit-scrollbar-thumb{background:rgba(193,98,47,0.12)}
          `}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
